<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get notified · roamblr</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#fbfaf8] text-[#151515]">

    <div class="max-w-7xl mx-auto px-4 sm:px-6">
        <!-- Navigation -->
        <nav class="flex flex-wrap items-center justify-between py-4 sm:py-6 border-b border-[#eae7e2] gap-4">
            <a href="index.html" class="text-2xl sm:text-3xl font-bold tracking-tight hover:opacity-80">
                roam<span class="text-[#c4511c]">blr</span>
            </a>
            <div class="flex items-center gap-4 sm:gap-8">
                <a href="about.html" class="text-[#2e2e2e] hover:text-[#c4511c] font-medium text-sm sm:text-base">About</a>
                <a href="apply.html" class="border border-[#151515] hover:bg-[#151515] hover:text-white transition px-3 sm:px-5 py-1.5 sm:py-2 rounded-full font-semibold text-xs sm:text-sm whitespace-nowrap">
                    <i class="far fa-paper-plane mr-1"></i> Get listed
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="max-w-md mx-auto py-16 sm:py-24">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-[#f2ede7] rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-bell text-3xl text-[#c4511c]"></i>
                </div>
                <h1 class="text-3xl font-bold mb-2" id="city-heading">Get notified when Lagos launches</h1>
                <p class="text-[#5a5a5a]">We'll email you as soon as creators join this city.</p>
            </div>

            <!-- Email Form - FIXED WITH CORRECT FORMSPREE URL -->
            <div class="bg-white rounded-2xl p-8 border border-[#eeebe6] shadow-sm">
                <form id="notify-form" action="https://formspree.io/f/xdawoaan" method="POST">
                    <input type="hidden" name="_subject" value="New city notification request - roamblr">
                    <input type="hidden" name="_redirect" value="thanks.html?type=notify">
                    <input type="hidden" name="city" id="city-input" value="">
                    
                    <div class="mb-6">
                        <label class="block text-sm font-semibold mb-2">Email address <span class="text-[#c4511c]">*</span></label>
                        <input type="email" name="email" required class="w-full border border-[#ddd8d0] rounded-full px-5 py-3 outline-none focus:border-[#c4511c] transition" placeholder="you@example.com">
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-semibold mb-2">What city are you waiting for?</label>
                        <input type="text" name="city_name" id="city-display" readonly class="w-full bg-[#f9f6f2] border border-[#ddd8d0] rounded-full px-5 py-3 text-[#5a5a5a] cursor-not-allowed">
                    </div>

                    <div class="mb-6">
                        <label class="flex items-center gap-2 text-sm text-[#5a5a5a]">
                            <input type="checkbox" name="also_local" class="rounded text-[#c4511c]">
                            <span>I'm a local creator in this city (I want to be listed)</span>
                        </label>
                    </div>

                    <button type="submit" class="w-full bg-[#c4511c] hover:bg-[#a33f12] text-white font-semibold py-3 rounded-full transition">
                        <i class="fas fa-bell mr-2"></i> Notify me
                    </button>
                </form>
            </div>

            <div class="text-center mt-8">
                <a href="directory.html" class="text-sm text-[#6f6f6f] hover:text-[#c4511c]">
                    <i class="fas fa-arrow-left mr-1"></i> Back to all cities
                </a>
            </div>
        </div>

        <!-- Footer -->
        <footer class="border-t border-[#e6e0d8] py-8 mt-12">
            <div class="flex flex-col md:flex-row justify-between gap-6">
                <div>
                    <a href="index.html" class="text-xl font-bold">roam<span class="text-[#c4511c]">blr</span></a>
                    <p class="text-sm text-[#6a6a6a] mt-2">© 2026 roamblr</p>
                </div>
                <div class="flex gap-8">
                    <a href="about.html" class="text-sm text-[#6a6a6a] hover:text-[#c4511c]">About</a>
                    <a href="apply.html" class="text-sm text-[#6a6a6a] hover:text-[#c4511c]">Get listed</a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // Get city from URL
        function getCityFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('city') || 'Lagos';
        }

        // Update page with city name
        function updateCityName() {
            const city = getCityFromUrl();
            document.getElementById('city-heading').textContent = `Get notified when ${city} launches`;
            document.getElementById('city-display').value = city;
            document.getElementById('city-input').value = city.toLowerCase();
            document.title = `${city} launch notification · roamblr`;
        }

        // Form submission handling
        document.getElementById('notify-form')?.addEventListener('submit', function(e) {
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Submitting...';
            // Formspree handles the rest
        });

        // Run on load
        window.addEventListener('DOMContentLoaded', updateCityName);
    </script>
</body>
</html>
